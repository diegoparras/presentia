name: Publish image

# Publica la imagen de Presentia en GitHub Container Registry:
#   ghcr.io/diegoparras/presentia:latest   (y el tag de cada release)
#
# Se dispara a mano (Actions -> Publish image -> Run workflow) o al publicar
# un release. No corre en cada push para no rebuildear la imagen (pesada) de
# más. Tras el PRIMER push, hacé el package público en GitHub para que
# EasyPanel lo pueda pullear sin credenciales:
#   github.com/users/diegoparras/packages -> presentia -> Package settings
#   -> Change visibility -> Public

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/diegoparras/presentia

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost "${AGENT_TOOLSDIRECTORY}"
          sudo docker image prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker buildx imagetools inspect "${IMAGE_NAME}:latest"
