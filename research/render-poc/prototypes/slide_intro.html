<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { size: 1280px 720px; margin: 0; }
  html,body { margin:0; padding:0; }
  * { box-sizing: border-box; }
  .slide {
    width:1280px; height:720px; position:relative; overflow:hidden;
    font-family: "Poppins", "DejaVu Sans", sans-serif;
    background: linear-gradient(135deg, #ffffff 0%, #f4f1fb 60%, #efe7ff 100%);
  }
  .brandbar { position:absolute; top:0; left:0; right:0; height:8px;
    background: linear-gradient(90deg,#e25a4e,#7c51f8); }
  .content { display:flex; height:100%; padding:64px 80px; gap:48px; align-items:center; }
  .col { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .imgbox { width:100%; height:360px; border-radius:24px; overflow:hidden;
    box-shadow: 0 20px 40px rgba(16,24,40,.18);
    background: radial-gradient(circle at 30% 30%, #7c51f8, #3b1d8f); position:relative; }
  .imgbox::after { content:"IMG"; position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; color:rgba(255,255,255,.5); font-size:42px; letter-spacing:6px; }
  h1 { font-size:60px; line-height:1.05; margin:0 0 20px; color:#111827; font-weight:700; }
  .accent { width:80px; height:6px; border-radius:3px; background:#e25a4e; margin-bottom:24px; }
  p { font-size:20px; line-height:1.6; color:#4b5563; margin:0 0 28px; }
  .card { display:flex; align-items:center; gap:16px; background:rgba(255,255,255,.7);
    border:1px solid #e5e7eb; border-radius:14px; padding:18px 22px;
    box-shadow:0 6px 16px rgba(16,24,40,.06); backdrop-filter: blur(4px); }
  .avatar { width:52px; height:52px; border-radius:50%; background:#e25a4e; color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; }
  .who b { display:block; font-size:20px; color:#111827; }
  .who span { font-size:15px; color:#6b7280; }
</style>
</head>
<body>
  <div class="slide">
    <div class="brandbar"></div>
    <div class="content">
      <div class="col"><div class="imgbox"></div></div>
      <div class="col">
        <h1>Resumen del Producto</h1>
        <div class="accent"></div>
        <p>Dashboards personalizables para reportes en tiempo real y decisiones basadas en datos. Se integra con herramientas de terceros y escala con el crecimiento del negocio.</p>
        <div class="card">
          <div class="avatar">JD</div>
          <div class="who"><b>John Doe</b><span>Julio 2026</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
